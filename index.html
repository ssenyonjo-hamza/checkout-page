<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to the checkout</title>
  </head>
  <body>
    <h1>Checkout</h1>
    <section>
      <h2>Your cart</h2>
      <figure>
        <img
          src="./img/golden-teapot.jpg"
          width="300"
          alt="A golden tea-pot on a table"
          title="Are these common in your area?"
        />
        <figcaption>One of our golden teapots</figcaption>
      </figure>
      <p>$39.99</p>
    </section>

    <section>
      <h2>Payment Information</h2>
      <form action="https://httpbin.org/post" method="post">
        <label for="card-name">CardBearer Name *</label>
        <br />
        <input
          type="text"
          name="card-name
        "
          id="card-name"
          required
        />

        <br />
        <label for="card-number">Card Number *</label>
        <br />
        <input
          type="text"
          name="card-number
        "
          id="card-number"
          required
        />
        <p>Your 16-digit card number must be free of spaces or dashes.</p>

        <label for="expiry"
          >Card Expiry Date *
          <input
            type="month"
            name="expiry"
            id="expiry"
            placeholder="MM/YYYY"
            required
          />
        </label>

        <label for="code">CVV Code *</label>
        <input type="number" name="code" id="code" maxlength="4" required />

        <button type="submit">Place Order</button>
      </form>
    </section>
  </body>
</html>
